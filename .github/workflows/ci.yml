name: NestJS CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      # ১. কোড checkout করো
      - name: Checkout repository
        uses: actions/checkout@v4

      # ২. Node.js সেটআপ করো
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # ৩. Dependencies install করো (package-lock.json অনুযায়ী exact versions)
      - name: Install dependencies
        run: npm ci

      # ৪. Build করো
      - name: Build project
        run: npm run build

      # ৫. Unit test run করো
      - name: Run unit tests
        run: npm run test

      # ৬. (Optional) Test coverage দেখো
      - name: Run test coverage
        run: npm run test:cov